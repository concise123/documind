<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/basic.html}">
<head>
    <title>문서 상세</title>
</head>
<body>
<div layout:fragment="content">
    <div class="row mt-3">
        <div class="col">
            <div class="card">
                <div class="card-header">
                    문서 상세
                </div>
                <div class="card-body">
                    <table class="table">
                        <thead>
                        <tr>
                            <th>ID</th>
                            <th>파일명</th>
                            <th>파일 크기(Byte)</th>
                            <th>등록일</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr>
                            <td th:text="${document.id}"></td>
                            <td th:text="${document.originalFilename}"></td>
                            <td th:text="${document.fileSize}"></td>
                            <td th:text="${#temporals.format(document.regDate, 'yyyy-MM-dd')}"></td>
                        </tr>
                        </tbody>
                    </table>
                    <ul class="nav nav-tabs mt-4" id="documentTabs" role="tablist">
                        <li class="nav-item" role="presentation">
                            <button class="nav-link active" data-bs-toggle="tab"
                                    data-bs-target="#summary-tab" type="button">AI 요약</button>
                        </li>
                        <li class="nav-item" role="presentation">
                            <button class="nav-link" data-bs-toggle="tab"
                                    data-bs-target="#original-tab" type="button">원문</button>
                        </li>
                    </ul>
                    <div class="tab-content border border-top-0 p-3">
                        <div class="tab-pane fade show active" id="summary-tab">
                            <!-- PROCESSING -->
                            <div th:if="${document.status.name() == 'UPLOADED' or document.status.name() == 'PROCESSING'}" class="content-panel text-center">
                                <div class="mt-3">
                                    <p>AI 요약 생성 중입니다. 잠시 후 새로고침하여 결과를 확인하세요.</p>
                                </div>
                                <button class="btn btn-outline-secondary btn-sm" onclick="location.reload()">새로고침</button>
                            </div>
                            <!-- COMPLETED -->
                            <div th:if="${document.status.name() == 'COMPLETED'}" class="content-panel">
                                <textarea class="form-control" rows="15" readonly th:text="${document.summary}">
                                </textarea>
                            </div>
                            <!-- FAILED -->
                            <div th:if="${document.status.name() == 'FAILED'}" class="content-panel text-center">
                                <p class="mb-3">요약 생성에 실패했습니다.</p>
                            </div>
                        </div><!--summary tab end-->
                        <div class="tab-pane fade" id="original-tab">
                            <div class="content-panel">
                                <textarea class="form-control" rows="15" readonly th:text="${document.extractedText}">
                                </textarea>
                            </div>
                        </div>
                    </div><!--tab content end-->
                    <div class="my-4">
                        <div class="float-end">
                            <a th:href="@{/document/list}">목록</a>
                        </div>
                    </div>
                </div><!--end card body-->
            </div><!--end card-->
        </div>
    </div>
</div>
